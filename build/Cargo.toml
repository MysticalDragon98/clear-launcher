[package]
name = "clear-launcher"
version = "0.1.0"
edition = "2024"
description = "Offline Minecraft launcher CLI generated from the clear launcher recipe"
publish = false

[dependencies]
anyhow = "1.0"
indicatif = "0.17"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
ureq = { version = "2.12", default-features = false, features = ["tls"] }

[dev-dependencies]
tempfile = "3.10"
